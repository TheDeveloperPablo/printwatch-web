<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Simplify 404 — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ece9e2; font-family: system-ui, sans-serif; height: 100%; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframes/shared.jsx"></script>
<script type="text/babel" src="wireframes/editorial.jsx"></script>
<script type="text/babel" src="wireframes/terminal.jsx"></script>
<script type="text/babel" src="wireframes/minimal.jsx"></script>
<script type="text/babel" src="wireframes/concept404.jsx"></script>

<script type="text/babel">
const { useState } = React;
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakColor, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#1a1a1a",
  "showAccent": false,
  "name": "simplify404"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.showAccent ? tweaks.accent : '#1a1a1a';

  // Artboard sizing — desktop-ish frames
  const W = 720, H = 560;

  return (
    <>
      <DesignCanvas>
        <DCSection id="desktop" title="Desktop — 4 direcciones">
          <DCArtboard id="ed" label="01 · Editorial / brutalist" width={W} height={H}>
            <window.WireframeEditorial accent={accent} />
          </DCArtboard>

          <DCArtboard id="tm" label="02 · Terminal / dev" width={W} height={H}>
            <window.WireframeTerminal accent={accent} />
          </DCArtboard>

          <DCArtboard id="mn" label="03 · Minimalista clásico" width={W} height={H}>
            <window.WireframeMinimal accent={accent} />
          </DCArtboard>

          <DCArtboard id="ec" label="04 · Concepto 404" width={W} height={H}>
            <window.Wireframe404 accent={accent} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Acento de color">
          <TweakToggle
            label="Activar acento"
            value={tweaks.showAccent}
            onChange={v => setTweak('showAccent', v)}
          />
          {tweaks.showAccent && (
            <TweakColor
              label="Color"
              value={tweaks.accent}
              onChange={v => setTweak('accent', v)}
              presets={['#d94f04', '#0057ff', '#00875a', '#e5b800', '#7c3aed', '#1a1a1a']}
            />
          )}
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
